[logger]
interval_ms = 50
can_bitrate = 500000

# Cansult state notification (0x665)
[field]
can_id = 0x665
name = State
units = raw
start_byte = 0
bit_length = 8
type = U08
scale = 1.0
offset = 0.0
digits = 0
category = Cansult

