# Hybrid config: real CAN (cansult) + demo fields
# 13 CAN fields + 19 demo fields = 32 total

[logger]
interval_ms = 50
can_bitrate = 500000
demo = 1

# === Real CAN fields (cansult) ===

# Cansult state notification (0x665)
[field]
can_id = 0x665
name = State
units = raw
start_byte = 0
bit_length = 8
type = U08
scale = 1.0
offset = 0.0
digits = 0
category = Cansult

# CAN ID 0x666: ECU sensors
[field]
can_id = 0x666
name = Battery
units = V
start_byte = 0
bit_length = 8
type = U08
scale = 0.08
offset = 0.0
digits = 1
category = Engine

[field]
can_id = 0x666
name = Coolant
units = C
start_byte = 1
bit_length = 8
type = U08
scale = 1.0
offset = -50.0
digits = 0
category = Engine

[field]
can_id = 0x666
name = Ign Timing
units = deg
start_byte = 2
bit_length = 8
type = U08
scale = -1.0
offset = -110.0
digits = 0
category = Engine

[field]
can_id = 0x666
name = O2
units = mV
start_byte = 3
bit_length = 8
type = U08
scale = 10.0
offset = 0.0
digits = 0
category = Engine

[field]
can_id = 0x666
name = TPS
units = mV
start_byte = 4
bit_length = 8
type = U08
scale = 20.0
offset = 0.0
digits = 0
category = Engine

[field]
can_id = 0x666
name = AAC Valve
units = %
start_byte = 5
bit_length = 8
type = U08
scale = 0.5
offset = 0.0
digits = 1
category = Engine

# CAN ID 0x667: speed, RPM, injection, MAF
[field]
can_id = 0x667
name = Speed
units = km/h
start_byte = 0
bit_length = 8
type = U08
scale = 2.0
offset = 0.0
digits = 0
category = Vehicle

[field]
can_id = 0x667
name = RPM
units = rpm
start_byte = 1
bit_length = 16
type = U16
scale = 12.5
offset = 0.0
is_big_endian = 1
digits = 0
category = Engine

[field]
can_id = 0x667
name = Inj Time
units = ms
start_byte = 3
bit_length = 16
type = U16
scale = 0.01
offset = 0.0
is_big_endian = 1
digits = 2
category = Engine

[field]
can_id = 0x667
name = MAF
units = mV
start_byte = 5
bit_length = 16
type = U16
scale = 5.0
offset = 0.0
is_big_endian = 1
digits = 0
category = Engine

# SwitchBoard (0x640)
[field]
can_id = 0x640
name = IAT
units = C
start_byte = 0
bit_length = 16
type = S16
scale = 0.1
offset = 0.0
is_big_endian = 1
digits = 0
category = SwitchBoard
lut = 192:120, 325:100, 428:90, 570:80, 760:70, 1014:60, 1346:50, 1765:40, 2259:30, 2807:20, 3353:10, 3848:0, 4543:-20, 4860:-40

[field]
can_id = 0x640
name = MAP
units = kPa
start_byte = 2
bit_length = 16
type = U16
scale = 1.0
offset = 0.0
is_big_endian = 1
digits = 0
category = SwitchBoard
lut = 400:20, 4650:250

