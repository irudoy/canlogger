# Demo config: simulated race car data
# ECU (15) + GPS (4) + Suspension (4) + PDM (8) + Misc (1) = 32 fields

[logger]
interval_ms=10
demo=1

# === ECU ===

[field]
name=RPM
units=rpm
type=U16
scale=1
demo_func=sine
demo_min=800
demo_max=8500
demo_period_ms=4000

[field]
name=TPS
units=%
type=U16
scale=0.1
demo_func=ramp
demo_min=0
demo_max=100
demo_period_ms=3000

[field]
name=MAP
units=kPa
type=U16
scale=0.1
demo_func=sine
demo_min=20
demo_max=250
demo_period_ms=4000

[field]
name=AFR
units=AFR
type=U16
scale=0.01
demo_func=noise
demo_min=11.0
demo_max=15.5
demo_smoothing=0.97

[field]
name=CLT
units=degC
type=S16
scale=0.1
demo_func=ramp
demo_min=75
demo_max=105
demo_period_ms=120000

[field]
name=IAT
units=degC
type=S16
scale=0.1
demo_func=noise
demo_min=25
demo_max=55
demo_smoothing=0.99

[field]
name=IgnAdv
units=deg
type=S16
scale=0.1
demo_func=sine
demo_min=5
demo_max=35
demo_period_ms=4000

[field]
name=InjPW
units=ms
type=U16
scale=0.001
demo_func=sine
demo_min=2.0
demo_max=18.0
demo_period_ms=4000

[field]
name=FuelPres
units=kPa
type=U16
scale=0.1
demo_func=noise
demo_min=380
demo_max=420
demo_smoothing=0.98

[field]
name=OilPres
units=kPa
type=U16
scale=0.1
demo_func=noise
demo_min=250
demo_max=500
demo_smoothing=0.96

[field]
name=OilTemp
units=degC
type=S16
scale=0.1
demo_func=ramp
demo_min=80
demo_max=130
demo_period_ms=180000

[field]
name=Lambda
units=lambda
type=U16
scale=0.001
demo_func=noise
demo_min=0.75
demo_max=1.05
demo_smoothing=0.95

[field]
name=Knock
units=V
type=U16
scale=0.01
demo_func=noise
demo_min=0
demo_max=2.5
demo_smoothing=0.8

[field]
name=BattV
units=V
type=U16
scale=0.01
demo_func=noise
demo_min=13.2
demo_max=14.4
demo_smoothing=0.99

[field]
name=EGT
units=degC
type=U16
scale=1
demo_func=sine
demo_min=400
demo_max=900
demo_period_ms=5000

# === GPS ===

[field]
name=GPS_Speed
units=km/h
type=U16
scale=0.1
demo_func=sine
demo_min=0
demo_max=220
demo_period_ms=30000

[field]
name=GPS_Heading
units=deg
type=U16
scale=0.1
demo_func=ramp
demo_min=0
demo_max=360
demo_period_ms=30000

[field]
name=GPS_Lat
units=deg
type=S32
scale=0.0000001
offset=0
demo_func=sine
demo_min=55.750
demo_max=55.755
demo_period_ms=60000

[field]
name=GPS_Lon
units=deg
type=S32
scale=0.0000001
offset=0
demo_func=sine
demo_min=37.620
demo_max=37.630
demo_period_ms=45000

