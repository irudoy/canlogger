# Demo config for plausibility filter verification on device.
# Three identical sine waves 0..100 @ 4 s period on CAN 0x100:
#   Control  — no limits (reference waveform)
#   LastGood — valid_max=40, default strategy (freezes at last valid)
#   Clamp    — valid_max=40, invalid_strategy=clamp (saturates at 40)
# In MegaLogViewer open all three on one chart — Control shows the full
# sine, LastGood shows plateaus when the wave is above 40, Clamp shows
# the top half clipped flat at 40.

[logger]
interval_ms=10

[field]
can_id=0x100
name=Control
units=
type=U16
start_byte=0
bit_length=16
is_big_endian=1
scale=1
offset=0
demo_func=sine
demo_min=0
demo_max=100
demo_period_ms=4000

[field]
can_id=0x100
name=LastGood
units=
type=U16
start_byte=2
bit_length=16
is_big_endian=1
scale=1
offset=0
valid_max=40
demo_func=sine
demo_min=0
demo_max=100
demo_period_ms=4000

[field]
can_id=0x100
name=Clamp
units=
type=U16
start_byte=4
bit_length=16
is_big_endian=1
scale=1
offset=0
valid_max=40
invalid_strategy=clamp
demo_func=sine
demo_min=0
demo_max=100
demo_period_ms=4000
